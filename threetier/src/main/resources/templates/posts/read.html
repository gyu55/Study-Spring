<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시글 상세보기</title>
</head>
<body>
    <th:block th:object="${post}">
        <p th:text="*{postTitle}"></p>
        <p th:text="*{postContent}"></p>
        <p th:text="*{memberName}"></p>
        <p th:text="'조회 수:' + *{postReadCount}"></p>
    </th:block>
<!--    수정은 페이지 이동이라 window.location 추천
    <button th:onclick="@{window.location.href='/posts/update(id=*{id})'}"-->
    <a th:href="@{/posts/update(id=*{post.id})}">
        <button>게시글 수정</button>
    </a>
    <a th:href="@{/posts/delete-ok(id=*{post.id})}">
        <button>게시글 삭제</button>
    </a>
</body>
</html>
