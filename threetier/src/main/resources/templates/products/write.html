<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>상품 등록</title>
</head>
<body>
<form th:action="@{/products/write-ok}" method="post" th:object="${product}">
    <input type="text" th:field="*{productName}" placeholder="상품명" />
    <input type="text" th:field="*{productPrice}" placeholder="상품가격" />
    <input type="text" th:field="*{productStock}" placeholder="상품재고" />
    <input type="text" th:field="*{productBrand}" placeholder="브랜드" />
    <a th:href="@{/products/product}">등록 취소</a>
    <button type="submit">상품등록</button>
</form>
</body>
</html>
