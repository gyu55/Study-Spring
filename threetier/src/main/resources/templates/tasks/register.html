<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>시험 점수 입력</title>
</head>
<body>
    <form th:action="@{/tasks/result}"  method="post" th:object="${task}">
        <input type="text" th:field="*{kor}" placeholder="국어 점수">
        <input type="text" th:field="*{eng}" placeholder="국어 점수">
        <input type="text" th:field="*{math}" placeholder="국어 점수">
        <button type="submit">결과 보기</button>
    </form>
</body>
</html>
